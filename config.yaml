# Diabetes Prediction System - Configuration

# Model settings
model:
  name: "diabetes_prediction"
  version: "1.0.0"
  type: "RandomForest"
  n_estimators: 100
  random_state: 42
  test_size: 0.2
  cv_folds: 5

# Data settings
data:
  path: "diabetes_patients_data.xlsx"
  backup_path: "data/backup/"
  features:
    - age
    - glucose
    - bmi
    - blood_pressure
  target: diabetes
  
# Risk thresholds
risk_thresholds:
  very_high: 7
  high: 5
  medium: 3
  low: 0

# Dashboard settings
dashboard:
  title: "Diabetes Prediction System"
  port: 8501
  theme: "light"
  
# API settings
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"

# Paths
paths:
  models: "models/"
  data: "data/"
  logs: "logs/"
  reports: "reports/"
